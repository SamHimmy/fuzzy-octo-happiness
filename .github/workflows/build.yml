name: Build Mod

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest
            target: win

          - name: macOS
            os: macos-latest
            target: mac

          - name: Android (arm64)
            os: ubuntu-latest
            target: android64

          - name: Android (arm32)
            os: ubuntu-latest
            target: android32

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Geode CLI
        uses: geode-sdk/cli/.github/actions/setup@main
        with:
          version: latest

      - name: Install Geode SDK
        run: geode sdk install "${{ runner.temp }}/geode-sdk" --confirm

      - name: Build
        run: geode build -- -DCMAKE_BUILD_TYPE=Release
        env:
          GEODE_TARGET: ${{ matrix.config.target }}
          GEODE_SDK: ${{ runner.temp }}/geode-sdk

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.name }}-build
          path: build/*.geode
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.geode
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
